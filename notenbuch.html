<style>
  :root {
    --bg: #eef0f3;
    --surface: #ffffff;
    --ink: #1b1f27;
    --muted: #5d6675;
    --line: #e3e6ec;
    --accent: #3b6ce7;
    --accent-dunkel: #2c50ad;
    --accent-soft: #edf1fb;
    --good: #14683d;
    --mid: #8d6208;
    --bad: #a42a2a;
    --warn: #e8a13c;
    --kopf-bg: #1b1f27;
    --kopf-ink: #e8eaee;
    --info-bg: #f2f4f8;
    --info-border: #c6cedd;
    --mono: Consolas, "Cascadia Mono", "SF Mono", monospace;
    --radius: 10px;
    font-size: 15px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    line-height: 1.45;
  }
  .num { font-variant-numeric: tabular-nums; }

  /* ---------- Kopf ---------- */
  header {
    background: var(--kopf-bg);
    color: var(--kopf-ink);
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  header h1 {
    font-size: 1rem;
    margin: 0;
    font-weight: 650;
    letter-spacing: -0.01em;
    color: var(--kopf-ink);
  }
  header h1 .akzent { color: #8db0ff; }
  header button {
    background: transparent;
    color: #cdd3dd;
    border-color: #3a4150;
  }
  header button:hover { border-color: var(--accent); color: #fff; }
  header button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  header button.primary:hover { background: var(--accent-dunkel); }
  .file-status {
    font-size: 0.72rem;
    font-family: var(--mono);
    color: #8b94a5;
  }
  .file-status.dirty { color: #f2b3ab; font-weight: 600; }
  .spacer { flex: 1; }

  /* ---------- Buttons ---------- */
  button {
    font: inherit;
    border: 1px solid #d7dce4;
    background: var(--surface);
    color: var(--ink);
    border-radius: 7px;
    padding: 6px 12px;
    cursor: pointer;
    transition: border-color 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
  }
  button:hover { border-color: var(--accent); }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 650;
    box-shadow: 0 1px 4px rgba(59,108,231,0.35);
  }
  button.primary:hover { background: var(--accent-dunkel); }
  button.small { padding: 3px 8px; font-size: 0.8rem; }
  button.danger { color: var(--bad); }
  button.danger:hover { border-color: var(--bad); }
  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  input, select, textarea {
    font: inherit;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 5px 8px;
    background: #fff;
    color: var(--ink);
  }
  input[type="number"] { width: 72px; text-align: right; }
  label { font-size: 0.82rem; color: var(--muted); display: block; margin-bottom: 2px; }

  /* ---------- Navigation ---------- */
  nav.klassen {
    display: flex;
    gap: 6px;
    padding: 14px 18px 0;
    flex-wrap: wrap;
    align-items: center;
  }
  nav.klassen button.tab {
    border-radius: 7px;
    background: transparent;
    border-color: transparent;
    color: var(--muted);
    font-size: 0.85rem;
  }
  nav.klassen button.tab.active {
    background: var(--accent-soft);
    color: var(--accent-dunkel);
    border-color: #ccd9f5;
    font-weight: 650;
  }
  nav.views {
    display: flex;
    gap: 2px;
    margin: 10px 18px 0;
    padding: 3px;
    background: #e4e7ed;
    border: 1px solid var(--line);
    border-radius: 9px;
    width: fit-content;
  }
  nav.views button { border: none; background: transparent; color: var(--muted); padding: 5px 14px; border-radius: 7px; font-size: 0.85rem; }
  nav.views button.active { background: var(--surface); color: var(--ink); font-weight: 650; box-shadow: 0 1px 3px rgba(27,31,39,0.15); }

  main { padding: 16px 18px 60px; max-width: 1400px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 16px;
    box-shadow: 0 1px 2px rgba(27,31,39,0.04);
  }
  .card h2 { margin: 0 0 10px; font-size: 0.95rem; font-weight: 650; }
  .kennzahlen { display: flex; gap: 22px; flex-wrap: wrap; margin: 0 0 4px; }
  .kennzahlen span { font-size: 0.72rem; color: var(--muted); }
  .kennzahlen b { display: block; font-size: 0.95rem; font-weight: 650; color: var(--ink); font-variant-numeric: tabular-nums; }
  .card h3 {
    margin: 22px 0 10px;
    font-size: 0.76rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card h3::before {
    content: "";
    width: 3px;
    height: 0.85em;
    background: var(--accent);
    border-radius: 2px;
    flex-shrink: 0;
  }
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end; }
  .hint { font-size: 0.78rem; color: var(--muted); }

  /* ---------- Erklärungs-Boxen ---------- */
  .info {
    font-size: 0.82rem;
    color: var(--ink);
    background: var(--info-bg);
    border-left: 3px solid var(--info-border);
    border-radius: 6px;
    padding: 8px 10px;
    margin: 8px 0 12px;
  }
  .info:empty { display: none; }
  p.info::before { content: "ℹ️ "; }
  .info p { margin: 0; }
  .info p + p { margin-top: 6px; }
  details.info > summary { cursor: pointer; color: var(--muted); }
  details.info > summary::marker { color: var(--accent); }
  details.info[open] > summary { margin-bottom: 6px; }
  details.info > summary.warn { color: var(--ink); }
  details.info > summary.warn::before { content: "⚠️ "; }

  /* ---------- Visuelle Legende (Übersicht) ---------- */
  .legende { display: flex; flex-wrap: wrap; gap: 6px 18px; align-items: center; margin: 10px 0 4px; }
  .legende-item { display: inline-flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--muted); }
  .legende-item .bsp { white-space: nowrap; }

  /* ---------- Options-Panels (gruppieren zusammengehörige Aktionen) ---------- */
  .optiongroup {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin: 10px 0 6px;
  }
  .option {
    flex: 1 1 280px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #f8f9fb;
    padding: 12px 14px;
  }
  .option h4 {
    margin: 0;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--ink);
  }
  .option .hint { margin: 0; flex: 1; }
  .option .fields {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .option .fields label { margin-bottom: 3px; }
  .option .apply { align-self: flex-start; margin-top: 2px; }
  /* Aktions-Button: klar sichtbar, aber unter dem globalen Speichern-Primary */
  button.action {
    border-color: #ccd9f5;
    color: var(--accent-dunkel);
    background: var(--accent-soft);
    font-weight: 600;
  }
  button.action:hover { background: #dde7fa; border-color: var(--accent); }

  /* ---------- Tabellen ---------- */
  table { border-collapse: collapse; width: 100%; font-size: 0.86rem; }
  th, td { border: 1px solid #e9ebf0; padding: 5px 10px; text-align: left; }
  th { background: #f4f6f9; font-weight: 600; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  td { font-variant-numeric: tabular-nums; }
  td.num, th.num { text-align: right; }
  tr:hover td { background: #f5f8fd; }
  .table-scroll { overflow-x: auto; }
  td input[type="number"] { width: 68px; border: 1px solid var(--line); background: #f7f8fa; border-radius: 5px; }
  td input[type="number"]:hover { border-color: var(--accent); }
  td input[type="number"]:focus { border-color: var(--accent); background: #fff; }
  tr.avg-row td { background: #f4f6f9; border-top: 2px solid var(--line); font-weight: 650; }
  tr.avg-row td:first-child { color: var(--muted); text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.05em; }
  tr.avg-row:hover td { background: #f4f6f9; }

  /* ---------- Notenchips ---------- */
  .grade {
    display: inline-block;
    min-width: 44px;
    text-align: center;
    padding: 1px 8px;
    border-radius: 6px;
    font-weight: 650;
    font-size: 0.82rem;
    font-variant-numeric: tabular-nums;
    background: #eceef2;
  }
  .g1 { background: #e1f3e7; color: var(--good); }
  .g2 { background: #e7f1de; color: #48761c; }
  .g3 { background: #fcf1d2; color: var(--mid); }
  .g4 { background: #fbe8d3; color: #a05a12; }
  .g5 { background: #fbe1dc; color: var(--bad); }
  .g6 { background: #f6cfcf; color: #8f1f1f; }
  .borderline { box-shadow: 0 0 0 2px var(--warn); }
  .dec { font-size: 0.72rem; color: #9aa2b0; margin-left: 4px; font-family: var(--mono); font-variant-numeric: tabular-nums; }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 40px 10px;
  }

  dialog {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    max-width: 560px;
    width: 92%;
    padding: 18px;
    box-shadow: 0 20px 60px rgba(15,18,24,0.3);
  }
  dialog::backdrop { background: rgba(15,18,24,0.4); }

  .leistung-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 4px;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
  }
  .leistung-item:last-child { border-bottom: none; }
  .typ-badge {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 2px 7px;
    border-radius: 5px;
    background: var(--accent-soft);
    color: var(--accent-dunkel);
  }
  .footerbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--line);
    padding: 6px 18px;
    font-size: 0.75rem;
    color: var(--muted);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  @media (prefers-reduced-motion: no-preference) {
    .card { animation: fade 0.15s ease-out; }
    @keyframes fade { from { opacity: 0.6; } to { opacity: 1; } }
  }
  .print-only { display: none; }
  @media print {
    header, nav.klassen, nav.views, .footerbar, #exportBar { display: none !important; }
    body { background: #fff; }
    main { padding: 0; }
    .card { border: none; padding: 0; margin-bottom: 0; }
    .print-only { display: block; margin-bottom: 12px; }
    table { font-size: 10px; }
    .hint, .info, .legende { display: none; }
    .table-scroll { overflow: visible; }
  }
</style>
</head>

/* ================= Zustand ================= */

// Kategorien sind ab jetzt pro Klasse konfigurierbar (kl.kategorien), nicht mehr global fest.
function kategorieLabel(kl, id) {
  const k = (kl.kategorien || []).find(x => x.id === id);
  return k ? k.label : id;
}
function kategorieVon(kl, id) {
  // Liefert die effektive Top-Level-Kategorie, in die eine Leistung dieses Typs einfließt
  // (identisch mit id, außer die Kategorie ist zu einer anderen "gefaltet")
  const k = (kl.kategorien || []).find(x => x.id === id);
  if (!k) return id;
  return k.faltetZu || k.id;
}
function aktiveKategorien(kl) {
  return (kl.kategorien || []).filter(k => k.aktiv);
}

let state = neuerZustand();
let fileHandle = null;
let letzterDateiname = "notenbuch.json"; // fürs Web-Share-Speichern ohne fileHandle (iOS u. Ä.)
let verschluesselung = null; // null = unverschlüsselt, sonst { key, saltB64, iterationen } der offenen Datei
let dirty = false;
let aktiveKlasse = null;

    notensystem: notensystem === "np" ? "np" : "note", // "note" (1–6, Sek I) | "np" (0–15, Kursstufe)
    schueler: [],

    overrides: {},
    kategorien: [
      { id: "ka", label: "Klassenarbeit", aktiv: true, faltetZu: null, gewicht: 60 },

      { id: "muendlich", label: "Mündlich", aktiv: true, faltetZu: null, gewicht: 40 },

    ],
    einstellungen: {}
  };
}

/* ================= Notenlogik ================= */

// Feste Kursstufen-Punktetabelle: gilt für Klausuren mit 30 VP maximal, NP 15 bereits ab 28,5 VP.
// Keine Skalierung auf andere Maximalpunktzahlen — bei Abweichungen die Schwellwerte manuell anpassen.
const KURSSTUFE_FIX_SCHLUESSEL = [
  { note: 0, minVP: 0 }, { note: 1, minVP: 5.5 }, { note: 2, minVP: 7.5 }, { note: 3, minVP: 9.5 },
  { note: 4, minVP: 11.5 }, { note: 5, minVP: 13.5 }, { note: 6, minVP: 15 }, { note: 7, minVP: 16.5 },
  { note: 8, minVP: 18 }, { note: 9, minVP: 19.5 }, { note: 10, minVP: 21 }, { note: 11, minVP: 22.5 },
  { note: 12, minVP: 24 }, { note: 13, minVP: 25.5 }, { note: 14, minVP: 27 }, { note: 15, minVP: 28.5 }
];
function notenschluesselKursstufeFix() {
  return KURSSTUFE_FIX_SCHLUESSEL.map(r => ({ ...r })); // Kopie, damit spätere Bearbeitung die Konstante nicht verändert
}

function notenschluesselKnick(maxVP, vp1, knickVP, knickNote, vp6) {
  // Zwei linear interpolierte Segmente mit frei wählbarer Note am Knick (knickNote, Viertelnote):
  //   Note 1 ↔ knickNote  zwischen vp1 und knickVP  (oberes, meist steileres Segment)
  //   knickNote ↔ Note 6   zwischen knickVP und vp6  (unteres, meist flacheres Segment)
  // Werte oberhalb vp1 bzw. unterhalb vp6 werden über die normale Notenschlüssel-Suche automatisch
  // auf die beste (1,00) bzw. schlechteste (6,00) Note gedeckelt.
  const kn = Math.min(5.75, Math.max(1.25, Math.round(knickNote * 4) / 4)); // Knick strikt zwischen 1 und 6 halten
  const rows = [];
  for (let n = 1; n <= 6.001; n += 0.25) {
    const note = Math.round(n * 4) / 4;
    let vp;
    if (note <= kn) {
      const anteil = (note - 1) / (kn - 1); // 0 bei Note 1, 1 bei knickNote
      vp = vp1 + anteil * (knickVP - vp1);
    } else {
      const anteil = (note - kn) / (6 - kn); // 0 bei knickNote, 1 bei Note 6
      vp = knickVP + anteil * (vp6 - knickVP);
    }
    rows.push({ note, minVP: Math.round(vp * 2) / 2 });
  }
  return rows;
}

function notenschluesselLinear(maxVP, system) {
  const sys = system === "np" ? "np" : "note";
  const rows = [];
  if (sys === "np") {
    // Notenpunkte 15 (beste) … 0 (schlechteste); linear; mehr Punkte = mehr VP nötig
    for (let np = 15; np >= 0; np--) {
      rows.push({ note: np, minVP: Math.round((maxVP * np / 15) * 2) / 2 });
    }
  } else {
    // Viertelnotenschritte 1,00 … 6,00; linear; Schwellwert abgerundet auf ganze/halbe VP
    for (let n = 1; n <= 6.001; n += 0.25) {
      const note = Math.round(n * 4) / 4;
      const vp = maxVP * (6 - note) / 5;
      rows.push({ note, minVP: Math.round(vp * 2) / 2 });
    }
  }
  return rows;
}

function noteAusSchluessel(schluessel, vp, system) {
  const sys = system === "np" ? "np" : "note";
  if (sys === "np") {
    // beste NP (größter Wert), deren Schwellwert erreicht wird
    let beste = 0;
    for (const r of schluessel) {
      if (vp >= r.minVP && r.note > beste) beste = r.note;
    }
    return beste;
  }
  // beste Note (kleinster Wert), deren Schwellwert erreicht wird
  let beste = 6;
  for (const r of schluessel) {
    if (vp >= r.minVP && r.note < beste) beste = r.note;
  }
  return beste;
}

function leistungsNote(l, sid) {
  const e = l.noten[sid];
  if (!e) return null;
  if (l.modus === "note") {
    return (typeof e.note === "number" && !isNaN(e.note)) ? e.note : null;
  }
  if (!Array.isArray(e.vp)) return null;
  const eingegeben = e.vp.some(v => typeof v === "number" && !isNaN(v));
  if (!eingegeben) return null;
  const sum = e.vp.reduce((a, v) => a + (typeof v === "number" && !isNaN(v) ? v : 0), 0);
  return noteAusSchluessel(l.schluessel, sum, l.system);
}

function vpSumme(l, sid) {
  const e = l.noten[sid];
  if (!e || !Array.isArray(e.vp)) return 0;
  return e.vp.reduce((a, v) => a + (typeof v === "number" && !isNaN(v) ? v : 0), 0);
}

function kategorieSchnitt(kl, sid, kategorie, hj) {
  // hj: 1 | 2 | null (ganzes Jahr) — gewichtetes Mittel innerhalb der Kategorie
  // Gefaltete Kategorien (z. B. GFS oder Test bei "zählt zu KA") zählen automatisch mit
  let sumW = 0, sumN = 0;
  for (const l of kl.leistungen) {
    if (kategorieVon(kl, l.typ) !== kategorie) continue;
    if (hj && l.halbjahr !== hj) continue;
    const n = leistungsNote(l, sid);
    if (n === null) continue; // kein Eintrag = für diesen Schüler nicht vorgesehen, zählt nicht als 0
    const w = l.gewicht || 1;
    sumW += w;
    sumN += n * w;
  }
  return sumW > 0 ? sumN / sumW : null;
}

function gesamtDezimal(kl, sid, hj) {
  let sumW = 0, sumN = 0;
  for (const kat of (kl.kategorien || [])) {
    if (!kat.aktiv || kat.faltetZu) continue; // nur eigene, aktive Top-Level-Kategorien tragen ein Gewicht
    const avg = kategorieSchnitt(kl, sid, kat.id, hj);
    if (avg === null) continue;
    const w = kat.gewicht || 0;
    sumW += w;
    sumN += avg * w;
  }
  return sumW > 0 ? sumN / sumW : null;
}

function jahresDezimal(kl, sid) {
  return gesamtDezimal(kl, sid, null);
}

const rundeViertel = x => Math.round(x * 4) / 4;
const rundeGanz = x => Math.min(6, Math.max(1, Math.round(x)));
const rundeNP = x => Math.min(15, Math.max(0, Math.round(x)));
const istGrenzfall = x => { const f = Math.abs(x - Math.round(x)); return f >= 0.4 && f <= 0.6 || Math.abs(x % 1 - 0.5) < 0.1; };
// Zuordnung NP → Notenband 1–6, damit dieselben Farbklassen (g1…g6) wiederverwendet werden können
const NP_BAND = [6,5,5,5,4,4,4,3,3,3,2,2,2,1,1,1];

function fmt(x, nk = 2) {
  if (x === null || x === undefined || isNaN(x)) return "–";
  return x.toFixed(nk).replace(".", ",");
}
function gradeClass(x, system) {
  if (x === null || x === undefined || isNaN(x)) return "";
  if (system === "np") {
    const np = Math.min(15, Math.max(0, Math.round(x)));
    return "g" + NP_BAND[np];
  }
  return "g" + Math.min(6, Math.max(1, Math.round(x)));
}
function chip(x, nk, borderline = false, system, mark = "") {
  if (x === null) return '<span class="grade">–</span>';
  return `<span class="grade ${gradeClass(x, system)} ${borderline ? "borderline" : ""}">${fmt(x, nk)}${mark}</span>`;
}

/* Aufklapp-Infos: Offen-Zustand überlebt das Neu-Rendern (innerHTML ersetzt sonst alles zugeklappt) */

/* ================= Datei-Handling ================= */

const hatFSA = "showOpenFilePicker" in window;
const dateiTypen = [{ description: "Notenbuch-Datei", accept: { "application/json": [".json"] } }];

function setDirty(d) {
  dirty = d;
  const st = document.getElementById("fileStatus");
  const name = fileHandle ? fileHandle.name : "Keine Datei geöffnet";
  st.textContent = name + (d ? " — ungespeicherte Änderungen" : (fileHandle ? " — gespeichert" : ""));
  st.classList.toggle("dirty", d);
}

function migriere(st) {
  for (const kl of st.klassen || []) {
    if (!kl.notensystem) kl.notensystem = "note";
    for (const l of kl.leistungen || []) {
      if (!l.system) l.system = kl.notensystem;
    }
    if (!kl.kategorien) {
      // Alte Dateien hatten ein festes gewichte-Objekt in kl.einstellungen statt kl.kategorien
      const g = (kl.einstellungen && kl.einstellungen.gewichte) || { ka: 60, test: 10, muendlich: 30 };
      kl.kategorien = [
        { id: "ka", label: "Klassenarbeit", aktiv: true, faltetZu: null, gewicht: g.ka ?? 60 },
        { id: "test", label: "Test", aktiv: true, faltetZu: null, gewicht: g.test ?? 10 },
        { id: "muendlich", label: "Mündlich", aktiv: true, faltetZu: null, gewicht: g.muendlich ?? 30 },
        { id: "gfs", label: "GFS", aktiv: true, faltetZu: "ka", gewicht: 0 }
      ];
      if (kl.einstellungen) delete kl.einstellungen.gewichte;
    }
  }
  return st;
}

/* ---------- Passwortschutz (AES-GCM, clientseitig — kein Server, keine Wiederherstellung) ---------- */

function bufZuBase64(buf) {
  const bytes = buf instanceof Uint8Array ? buf : new Uint8Array(buf);
  let bin = "";
  bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
}
function base64ZuBuf(str) {
  const bin = atob(str);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function schluesselAbleiten(passwort, salt, iterationen) {
  const basis = await crypto.subtle.importKey("raw", new TextEncoder().encode(passwort), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: iterationen, hash: "SHA-256" },
    basis,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt", "decrypt"]
  );
}

// Neues Passwort einrichten (oder bestehendes ändern): eigenes Salt, damit ein Passwortwechsel
// nicht denselben Schlüssel für unterschiedliche Passwörter wiederverwendet.
async function passwortEinrichten(passwort) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iterationen = 250000;
  const key = await schluesselAbleiten(passwort, salt, iterationen);
  verschluesselung = { key, saltB64: bufZuBase64(salt), iterationen };
}

async function envelopeVerschluesseln(stateObj) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const klartext = new TextEncoder().encode(JSON.stringify(stateObj));
  const ciphertext = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, verschluesselung.key, klartext);
  return JSON.stringify({
    notenbuchVerschluesselt: true,
    kdf: "PBKDF2-SHA256",
    iterationen: verschluesselung.iterationen,
    salt: verschluesselung.saltB64,
    iv: bufZuBase64(iv),
    ciphertext: bufZuBase64(ciphertext)
  });
}

// Wirft bei falschem Passwort (AES-GCM-Authentifizierung schlägt fehl) — vom Aufrufer abzufangen.
async function envelopeEntschluesseln(envelope, passwort) {
  const salt = base64ZuBuf(envelope.salt);
  const iv = base64ZuBuf(envelope.iv);
  const key = await schluesselAbleiten(passwort, salt, envelope.iterationen);
  const ciphertext = base64ZuBuf(envelope.ciphertext);
  const klartext = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ciphertext);
  return { stateObj: JSON.parse(new TextDecoder().decode(klartext)), key };
}

function aktualisierePasswortButton() {
  const b = document.getElementById("btnPasswort");
  if (verschluesselung) {
    b.textContent = "🔒 Geschützt";
    b.title = "Passwort ändern oder Schutz entfernen";
  } else {
    b.textContent = "🔓 Passwortschutz";
    b.title = "Passwortschutz für diese Datei einrichten";
  }
}

// Löst mit { stateObj, key } auf, oder verwirft mit "abgebrochen" wenn der Nutzer abbricht.
function entsperrenDialog(envelope) {
  return new Promise((resolve, reject) => {
    const d = document.createElement("dialog");
    d.innerHTML = `
      <h2 style="margin-top:0">🔒 Datei ist passwortgeschützt</h2>
      <p class="info">Diese Notenbuch-Datei ist verschlüsselt. Gib das Passwort ein, um sie zu öffnen.</p>
      <div><label>Passwort</label><input type="password" id="epPw" style="width:100%"></div>
      <p class="hint" id="epFehler" style="color:var(--bad);min-height:1.2em"></p>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
        <button id="epAbbr">Abbrechen</button>
        <button class="primary" id="epOk">Entsperren</button>
      </div>`;
    document.body.appendChild(d);
    d.showModal();
    const pwInput = d.querySelector("#epPw");
    pwInput.focus();
    const schliessen = () => { d.close(); d.remove(); };
    d.querySelector("#epAbbr").onclick = () => { schliessen(); reject("abgebrochen"); };
    const versuchen = async () => {
      const pw = pwInput.value;
      if (!pw) return;
      const okBtn = d.querySelector("#epOk");
      okBtn.disabled = true;
      try {
        const ergebnis = await envelopeEntschluesseln(envelope, pw);
        schliessen();
        resolve(ergebnis);
      } catch (e) {
        d.querySelector("#epFehler").textContent = "Falsches Passwort. Bitte erneut versuchen.";
        pwInput.value = "";
        pwInput.focus();
        okBtn.disabled = false;
      }
    };
    d.querySelector("#epOk").onclick = versuchen;
    pwInput.onkeydown = e => { if (e.key === "Enter") versuchen(); };
  });
}

function passwortDialog() {
  const geschuetzt = !!verschluesselung;
  const d = document.createElement("dialog");
  d.innerHTML = geschuetzt ? `
    <h2 style="margin-top:0">🔒 Passwortschutz</h2>
    <p class="info">Diese Datei ist verschlüsselt. Das Passwort wird nur clientseitig genutzt — es gibt keine Wiederherstellung, falls du es vergisst.</p>
    <h3 style="margin:16px 0 6px;font-size:0.85rem;color:var(--muted);border:none;padding:0">Neues Passwort setzen</h3>
    <div class="row">
      <div><label>Neues Passwort</label><input type="password" id="pwNeu1" style="width:100%"></div>
      <div><label>Wiederholen</label><input type="password" id="pwNeu2" style="width:100%"></div>
    </div>
    <p class="hint" id="pwFehler" style="color:var(--bad);min-height:1.2em"></p>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:6px">
      <button class="primary" id="pwAendern">Passwort ändern</button>
    </div>
    <h3 style="margin:20px 0 6px;font-size:0.85rem;color:var(--muted);border:none;padding:0">Schutz entfernen</h3>
    <p class="hint">Die Datei wird beim nächsten Speichern wieder als lesbares JSON abgelegt.</p>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="danger" id="pwEntfernen">Passwortschutz entfernen</button>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:16px">
      <button id="pwSchliessen">Schließen</button>
    </div>` : `
    <h2 style="margin-top:0">🔓 Passwortschutz einrichten</h2>
    <p class="info">Die Datei wird ab dem nächsten Speichern verschlüsselt. <strong>Wichtig:</strong> Es gibt keine Wiederherstellung — bei vergessenem Passwort sind alle Daten in dieser Datei unwiederbringlich verloren.</p>
    <div class="row">
      <div><label>Passwort</label><input type="password" id="pwNeu1" style="width:100%"></div>
      <div><label>Wiederholen</label><input type="password" id="pwNeu2" style="width:100%"></div>
    </div>
    <p class="hint" id="pwFehler" style="color:var(--bad);min-height:1.2em"></p>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
      <button id="pwAbbr">Abbrechen</button>
      <button class="primary" id="pwEinrichten">Einrichten &amp; speichern</button>
    </div>`;
  document.body.appendChild(d);
  d.showModal();
  const schliessen = () => { d.close(); d.remove(); };

  const neuesPasswortPruefen = () => {
    const p1 = d.querySelector("#pwNeu1").value;
    const p2 = d.querySelector("#pwNeu2").value;
    if (p1.length < 4) { d.querySelector("#pwFehler").textContent = "Mindestens 4 Zeichen."; return null; }
    if (p1 !== p2) { d.querySelector("#pwFehler").textContent = "Passwörter stimmen nicht überein."; return null; }
    return p1;
  };

  if (!geschuetzt) {
    d.querySelector("#pwAbbr").onclick = schliessen;
    d.querySelector("#pwEinrichten").onclick = async () => {
      const pw = neuesPasswortPruefen();
      if (!pw) return;
      await passwortEinrichten(pw);
      aktualisierePasswortButton();
      schliessen();
      await speichern();
    };
  } else {
    d.querySelector("#pwSchliessen").onclick = schliessen;
    d.querySelector("#pwAendern").onclick = async () => {
      const pw = neuesPasswortPruefen();
      if (!pw) return;
      await passwortEinrichten(pw); // neues Salt + Schlüssel ersetzen den alten
      schliessen();
      await speichern();
    };
    d.querySelector("#pwEntfernen").onclick = async () => {
      if (!confirm("Passwortschutz wirklich entfernen? Die Datei wird beim nächsten Speichern unverschlüsselt abgelegt.")) return;
      verschluesselung = null;
      aktualisierePasswortButton();
      schliessen();
      await speichern();
    };
  }
}

async function oeffnen() {
  try {
    let text, neuerHandle = null;
    if (hatFSA) {
      const [h] = await window.showOpenFilePicker({ types: dateiTypen });
      const file = await h.getFile();
      text = await file.text();
      neuerHandle = h;
    } else {
      const inp = document.createElement("input");
      inp.type = "file"; inp.accept = ".json";
      text = await new Promise((res, rej) => {
        inp.onchange = () => {
          const f = inp.files[0];
          if (!f) return rej();
          letzterDateiname = f.name;
          const r = new FileReader();
          r.onload = () => res(r.result);
          r.readAsText(f);
        };
        inp.click();
      });
    }
    const parsed = JSON.parse(text);
    let neuerState, neueVerschluesselung;
    if (parsed && parsed.notenbuchVerschluesselt) {
      const { stateObj, key } = await entsperrenDialog(parsed);
      neuerState = migriere(stateObj);
      neueVerschluesselung = { key, saltB64: parsed.salt, iterationen: parsed.iterationen };
    } else {
      neuerState = migriere(parsed);
      neueVerschluesselung = null;
    }
    // Erst nach erfolgreichem Entsperren übernehmen — sonst würde ein abgebrochenes Entsperren
    // spätere Autosaves versehentlich in die neu ausgewählte (noch verschlüsselte) Datei schreiben.
    if (neuerHandle) fileHandle = neuerHandle;
    state = neuerState;
    verschluesselung = neueVerschluesselung;
    aktiveKlasse = state.klassen[0]?.id ?? null;
    offeneLeistung = null;
    setDirty(false);
    aktualisierePasswortButton();
    renderAll();
  } catch (e) {
    if (e === "abgebrochen") return;
    if (e && e.name !== "AbortError") alert("Datei konnte nicht gelesen werden.");
  }
}

async function speichern(alsNeu = false) {
  let json;
  try {
    json = verschluesselung ? await envelopeVerschluesseln(state) : JSON.stringify(state, null, 1);
  } catch (e) { return alert("Verschlüsseln fehlgeschlagen."); }
  try {
    if (hatFSA) {
      if (!fileHandle || alsNeu) {
        fileHandle = await window.showSaveFilePicker({
          types: dateiTypen, suggestedName: "notenbuch.json"
        });
      }
      const w = await fileHandle.createWritable();
      await w.write(json);
      await w.close();
      setDirty(false);
    } else {
      // Kein direktes Dateisystem-API (v. a. iOS/iPadOS): Web Share mit Datei anbieten, wenn möglich —
      // öffnet das native Teilen-Menü, worüber sich die bestehende Datei überschreiben lässt (z. B. "In Dateien sichern").
      // Bricht der Nutzer das Teilen-Menü ab, bleibt die Änderung ungespeichert, ohne zusätzlich einen Download auszulösen.
      const datei = new File([json], letzterDateiname, { type: "application/json" });
      const kannTeilen = !!(navigator.canShare && navigator.canShare({ files: [datei] }));
      if (kannTeilen) {
        try {
          await navigator.share({ files: [datei], title: "Notenbuch" });
          setDirty(false);
          return;
        } catch (e) {
          if (e && e.name === "AbortError") return;
          // sonst: unten auf den Downloadlink ausweichen
        }
      }
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([json], { type: "application/json" }));
      a.download = letzterDateiname;
      a.click();
      setDirty(false);
    }
  } catch (e) { if (e && e.name !== "AbortError") alert("Speichern fehlgeschlagen."); }
}

let autosaveTimer = null;
function markiereAenderung() {
  setDirty(true);
  if (hatFSA && fileHandle) {
    clearTimeout(autosaveTimer);
    autosaveTimer = setTimeout(async () => {
      await speichern();
      document.getElementById("autosaveInfo").textContent =
        "Automatisch gespeichert um " + new Date().toLocaleTimeString("de-DE");
    }, 1500);
  }
}

window.addEventListener("beforeunload", e => {
  if (dirty) { e.preventDefault(); e.returnValue = ""; }
});

/* ================= Rendering ================= */

const $ = sel => document.querySelector(sel);
const klasse = () => state.klassen.find(k => k.id === aktiveKlasse) || null;

function renderAll() {
  renderKlassenNav();
  renderViewNav();
  renderMain();
}

function renderKlassenNav() {
  const nav = $("#klassenNav");
  nav.innerHTML = "";
  for (const k of state.klassen) {
    const b = document.createElement("button");
    b.className = "tab" + (k.id === aktiveKlasse ? " active" : "");
    b.textContent = `${k.name} · ${k.fach}${k.notensystem === "np" ? " (NP)" : ""}`;
    b.onclick = () => { aktiveKlasse = k.id; offeneLeistung = null; renderAll(); };
    nav.appendChild(b);
  }
  const add = document.createElement("button");
  add.className = "small";
  add.textContent = "+ Klasse";
  add.onclick = klasseDialog;
  nav.appendChild(add);
}

function renderViewNav() {
  const nav = $("#viewNav");
  nav.style.display = klasse() ? "flex" : "none";
  nav.querySelectorAll("button").forEach(b => {
    b.classList.toggle("active", b.dataset.view === aktiveView);
    b.onclick = () => { aktiveView = b.dataset.view; offeneLeistung = null; renderAll(); };
  });
}

function renderMain() {
  const m = $("#main");
  const kl = klasse();
  if (!kl) {
    m.innerHTML = `<div class="empty">
      <p><strong>Noch keine Klasse angelegt.</strong></p>
      <p>Lege oben eine Klasse an oder öffne eine bestehende Notenbuch-Datei.</p>
    </div>`;
    return;
  }
  if (offeneLeistung) return renderLeistungEingabe(m, kl);
  if (aktiveView === "uebersicht") return renderUebersicht(m, kl);
  if (aktiveView === "leistungen") return renderLeistungen(m, kl);
  if (aktiveView === "schueler") return renderSchueler(m, kl);
  if (aktiveView === "einstellungen") return renderEinstellungen(m, kl);
}

/* ---------- Übersicht ---------- */

function csvEscape(v) {
  const s = String(v ?? "");
  if (s.includes(";") || s.includes('"') || s.includes("\n")) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function exportCSV(kl) {
  const leistNachTyp = {};
  for (const k of aktiveKategorien(kl)) leistNachTyp[k.id] = kl.leistungen.filter(l => l.typ === k.id);
  const leistungenFlat = [];
  const header = ["Schüler/in"];
  for (const k of aktiveKategorien(kl)) {
    for (const l of leistNachTyp[k.id]) {
      header.push(`${l.titel} (HJ${l.halbjahr})`);
      leistungenFlat.push(l);
    }
  }
  if (kl.notensystem === "np") {
    header.push("HJ1 Endnote (NP)", "HJ1 Dezimal", "HJ2 Endnote (NP)", "HJ2 Dezimal");
  } else {
    header.push("HJ1 (Viertelnote)", "HJ1 Dezimal", "HJ2 (Viertelnote)", "HJ2 Dezimal", "Jahr (ganze Note)", "Jahr Dezimal");
  }

  const rows = [header];
  for (const s of kl.schueler) {
    const row = [s.name];
    for (const l of leistungenFlat) {
      const n = leistungsNote(l, s.id);
      row.push(n === null ? "" : fmt(n, l.system === "np" ? 0 : 2));
    }
    const ov = kl.overrides[s.id] || {};
    const h1 = gesamtDezimal(kl, s.id, 1);
    const h2 = gesamtDezimal(kl, s.id, 2);
    if (kl.notensystem === "np") {
      const h1Wert = ov.hj1 != null ? ov.hj1 : (h1 !== null ? rundeNP(h1) : null);
      const h2Wert = ov.hj2 != null ? ov.hj2 : (h2 !== null ? rundeNP(h2) : null);
      row.push(h1Wert === null ? "" : fmt(h1Wert, 0), h1 === null ? "" : fmt(h1, 2));
      row.push(h2Wert === null ? "" : fmt(h2Wert, 0), h2 === null ? "" : fmt(h2, 2));
    } else {
      const j = jahresDezimal(kl, s.id);
      const h1Wert = ov.hj1 != null ? ov.hj1 : (h1 !== null ? rundeViertel(h1) : null);
      const h2Wert = ov.hj2 != null ? ov.hj2 : (h2 !== null ? rundeViertel(h2) : null);
      const jWert = ov.jahr != null ? ov.jahr : (j !== null ? rundeGanz(j) : null);
      row.push(h1Wert === null ? "" : fmt(h1Wert, 2), h1 === null ? "" : fmt(h1, 2));
      row.push(h2Wert === null ? "" : fmt(h2Wert, 2), h2 === null ? "" : fmt(h2, 2));
      row.push(jWert === null ? "" : fmt(jWert, 0), j === null ? "" : fmt(j, 2));
    }
    rows.push(row);
  }

  const csv = rows.map(r => r.map(csvEscape).join(";")).join("\r\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${kl.name}_${kl.fach}_Noten.csv`.replace(/\s+/g, "_");
  a.click();
  URL.revokeObjectURL(a.href);
}

function renderUebersicht(m, kl) {
  if (kl.schueler.length === 0) {
    m.innerHTML = `<div class="empty">Noch keine Schüler. Trage sie unter <strong>Schüler</strong> ein.</div>`;
    return;
  }
  const leistNachTyp = {};
  for (const k of aktiveKategorien(kl)) leistNachTyp[k.id] = kl.leistungen.filter(l => l.typ === k.id);

  let kopf1 = "<tr><th rowspan='2'>Schüler/in</th>";
  let kopf2 = "<tr>";
  for (const k of aktiveKategorien(kl)) {
    const ls = leistNachTyp[k.id];
    if (ls.length === 0) continue;
    const zielId = kategorieVon(kl, k.id);
    const label = k.faltetZu
      ? `${k.label} (zählt zu ${kategorieLabel(kl, zielId)})`
      : `${k.label} (${k.gewicht} %)`;
    kopf1 += `<th colspan="${ls.length}">${label}</th>`;
    for (const l of ls) kopf2 += `<th title="${escapeHtml(l.titel)} · HJ${l.halbjahr} · Faktor ${l.gewicht}">${escapeHtml(kurz(l.titel))}<br><span style="font-weight:400;color:var(--muted)">HJ${l.halbjahr}</span></th>`;
  }
  kopf1 += kl.notensystem === "np"
    ? "<th rowspan='2'>HJ 1<br><span style='font-weight:400'>Endnote (NP)</span></th>" +
      "<th rowspan='2'>HJ 2<br><span style='font-weight:400'>Endnote (NP)</span></th></tr>"
    : "<th rowspan='2'>HJ 1<br><span style='font-weight:400'>Viertelnote</span></th>" +
      "<th rowspan='2'>HJ 2<br><span style='font-weight:400'>Viertelnote</span></th>" +
      "<th rowspan='2'>Jahr<br><span style='font-weight:400'>ganze Note</span></th></tr>";
  kopf2 += "</tr>";

  const sys = kl.notensystem;
  let rows = "";
  let grenzfaelle = 0;
  const hj1Dez = [], hj2Dez = [], jahrDez = [];
  for (const s of kl.schueler) {
    rows += `<tr><td><strong>${escapeHtml(s.name)}</strong></td>`;
    for (const k of aktiveKategorien(kl)) {
      for (const l of leistNachTyp[k.id]) {
        const n = leistungsNote(l, s.id);
        rows += `<td class="num">${n === null ? "–" : chip(n, l.system === "np" ? 0 : 2, false, l.system)}</td>`;
      }
    }
    const ov = kl.overrides[s.id] || {};
    const h1 = gesamtDezimal(kl, s.id, 1);
    const h2 = gesamtDezimal(kl, s.id, 2);
    if (h1 !== null) hj1Dez.push(h1);
    if (h2 !== null) hj2Dez.push(h2);
    rows += zellHalbjahr(kl, s.id, 1, h1, ov.hj1);
    rows += zellHalbjahr(kl, s.id, 2, h2, ov.hj2);
    if (sys === "np") {
      if (ov.hj1 == null && h1 !== null && istGrenzfall(h1)) grenzfaelle++;
      if (ov.hj2 == null && h2 !== null && istGrenzfall(h2)) grenzfaelle++;
    } else {
      const j = jahresDezimal(kl, s.id);
      if (j !== null) jahrDez.push(j);
      if (ov.jahr == null && j !== null && istGrenzfall(j)) grenzfaelle++;
      rows += zellJahr(s.id, j, ov.jahr);
    }
    rows += "</tr>";
  }

  /* Ø-Zeile: Klassendurchschnitt je Leistung + je Gesamtspalte (fehlende Einträge zählen nicht mit) */
  const mittel = a => a.length ? a.reduce((x, y) => x + y, 0) / a.length : null;
  let avgZellen = "";
  for (const k of aktiveKategorien(kl)) {
    for (const l of leistNachTyp[k.id]) {
      const noten = kl.schueler.map(s => leistungsNote(l, s.id)).filter(n => n !== null);
      avgZellen += `<td class="num">${fmt(mittel(noten), 2)}</td>`;
    }
  }
  avgZellen += `<td class="num">${fmt(mittel(hj1Dez), 2)}</td><td class="num">${fmt(mittel(hj2Dez), 2)}</td>`;
  if (sys !== "np") avgZellen += `<td class="num">${fmt(mittel(jahrDez), 2)}</td>`;
  rows += `<tr class="avg-row"><td>Ø Klasse</td>${avgZellen}</tr>`;

  const kennzahlen = `<div class="kennzahlen">
    <span>Schüler/innen<b>${kl.schueler.length}</b></span>
    <span>Leistungen<b>${kl.leistungen.length}</b></span>
    <span>Ø HJ 1<b>${fmt(mittel(hj1Dez), 2)}</b></span>
    <span>Ø HJ 2<b>${fmt(mittel(hj2Dez), 2)}</b></span>
    ${sys !== "np" ? `<span>Ø Jahr<b>${fmt(mittel(jahrDez), 2)}</b></span>` : ""}
    <span>Offene Grenzfälle<b>${grenzfaelle}</b></span>
  </div>`;

  /* Legende: Beispiel-Chips laufen durch denselben chip()-Pfad wie die echten Zellen */
  const legende = sys === "np" ? `<div class="legende">
    <span class="legende-item"><span class="bsp">${chip(9, 0, false, "np")}<span class="dec">8,80</span></span> Endnote mit Dezimalwert</span>
    <span class="legende-item"><span class="bsp">${chip(10, 0, true, "np")}<span class="dec">9,50</span></span> Grenzfall bei x,5 — anklicken zum Festlegen</span>
    <span class="legende-item"><span class="bsp">${chip(9, 0, false, "np", " •")}</span> manuell festgelegt</span>
  </div>` : `<div class="legende">
    <span class="legende-item"><span class="bsp">${chip(2.75, 2, false, "note")}<span class="dec">2,83</span></span> gerundete Note mit Dezimalwert</span>
    <span class="legende-item"><span class="bsp">${chip(4, 0, true, "note")}<span class="dec">3,50</span></span> Grenzfall bei x,5 (Jahresnote) — anklicken zum Festlegen</span>
    <span class="legende-item"><span class="bsp">${chip(3, 2, false, "note", " •")}</span> manuell festgelegt</span>
  </div>`;
  const hinweis = infoDetails("ueb-hinweise",
    sys === "np"
      ? `Hinweise zur Berechnung: gefaltete Kategorien, „nicht vorgesehen", eigenständige Halbjahres-Endnoten`
      : `Hinweise zur Berechnung: gefaltete Kategorien und „nicht vorgesehen"`,
    `<p>Gefaltete Kategorien (z. B. GFS) zählen automatisch zu ihrer Zielkategorie; fehlt bei einem Schüler ein Eintrag, gilt das als „nicht vorgesehen", nicht als 0${sys === "np" ? " NP" : ""}.</p>
    ${sys === "np" ? `<p>In der Kursstufe ist jedes Halbjahr eine eigenständige Endnote — es wird nichts zu einer Jahresnote verrechnet.</p>` : ""}`);

  m.innerHTML = `<div class="card">
    <div class="print-only"><strong>${escapeHtml(kl.name)} ${escapeHtml(kl.fach)} — ${escapeHtml(kl.schuljahr)}</strong>${kl.notensystem === "np" ? " · Kursstufe (NP)" : ""}
      <div style="font-size:0.8em;color:#666">Stand: ${new Date().toLocaleDateString("de-DE")}</div></div>
    <div class="row" id="exportBar" style="margin-bottom:10px">
      <button class="small" id="btnCSV">CSV exportieren</button>
      <button class="small" id="btnPDF">Drucken / PDF</button>
    </div>
    <h2>Gesamtübersicht — ${escapeHtml(kl.name)} ${escapeHtml(kl.fach)} (${escapeHtml(kl.schuljahr)})${kl.notensystem === "np" ? " · Kursstufe (NP)" : ""}</h2>
    ${kennzahlen}
    ${legende}
    ${hinweis}
    <div class="table-scroll"><table class="num">${kopf1}${kopf2}${rows}</table></div>
  </div>`;
  bindInfoDetails(m);

  m.querySelectorAll("[data-ov]").forEach(el => {
    el.onclick = () => overrideDialog(el.dataset.ov, el.dataset.sid);
  });
  $("#btnCSV").onclick = () => exportCSV(kl);
  $("#btnPDF").onclick = () => window.print();
}

function zellHalbjahr(kl, sid, hj, dez, override) {
  if (dez === null && override == null) return "<td class='num'>–</td>";
  const sys = kl.notensystem;
  const wert = override != null ? override : (sys === "np" ? rundeNP(dez) : rundeViertel(dez));
  const mark = override != null ? " •" : "";
  const grenz = override == null && dez !== null && sys === "np" && istGrenzfall(dez);
  return `<td class="num" style="cursor:pointer" data-ov="hj${hj}" data-sid="${sid}" title="Anklicken zum Festlegen">
    ${chip(wert, sys === "np" ? 0 : 2, grenz, sys, mark)}
    <span class="dec">${fmt(dez, 2)}</span></td>`;
}

function zellJahr(sid, dez, override) {
  if (dez === null && override == null) return "<td class='num'>–</td>";
  const auto = dez !== null ? rundeGanz(dez) : null;
  const wert = override != null ? override : auto;
  const grenz = override == null && dez !== null && istGrenzfall(dez);
  const mark = override != null ? " •" : "";
  return `<td class="num" style="cursor:pointer" data-ov="jahr" data-sid="${sid}" title="Anklicken zum Festlegen">
    ${chip(wert, 0, grenz, undefined, mark)}
    <span class="dec">${fmt(dez, 2)}</span></td>`;
}

function overrideDialog(feld, sid) {
  const kl = klasse();
  const sys = kl.notensystem;
  const s = kl.schueler.find(x => x.id === sid);
  const aktuell = (kl.overrides[sid] || {})[feld];
  const label = feld === "jahr"
    ? "Jahresnote (ganze Note)"
    : sys === "np"
      ? `Endnote HJ ${feld === "hj1" ? "1" : "2"} (Notenpunkte 0–15)`
      : `Halbjahresnote ${feld === "hj1" ? "1" : "2"} (Viertelnote)`;
  const eingabe = prompt(
    `${s.name} — ${label} festlegen.\nLeer lassen = automatische Berechnung verwenden.`,
    aktuell != null ? String(aktuell).replace(".", ",") : ""
  );
  if (eingabe === null) return;
  kl.overrides[sid] = kl.overrides[sid] || {};
  if (eingabe.trim() === "") {
    delete kl.overrides[sid][feld];
  } else {
    const v = parseFloat(eingabe.replace(",", "."));
    const maxVal = sys === "np" ? 15 : 6;
    const minVal = sys === "np" ? 0 : 1;
    if (isNaN(v) || v < minVal || v > maxVal) return alert(`Bitte einen Wert zwischen ${minVal} und ${maxVal} eingeben.`);
    if (feld === "jahr") kl.overrides[sid][feld] = Math.round(v);
    else kl.overrides[sid][feld] = sys === "np" ? Math.round(v) : rundeViertel(v);
  }
  markiereAenderung();
  renderMain();
}

/* ---------- Leistungen ---------- */

function renderLeistungen(m, kl) {
  let items = "";
  const sortiert = [...kl.leistungen].sort((a, b) => (a.datum || "").localeCompare(b.datum || ""));
  for (const l of sortiert) {
    const anz = kl.schueler.filter(s => leistungsNote(l, s.id) !== null).length;
    items += `<div class="leistung-item">
      <span class="typ-badge">${kategorieLabel(kl, l.typ)}</span>
      <strong>${escapeHtml(l.titel)}</strong>
      <span class="hint">HJ${l.halbjahr} · ${l.datum || "ohne Datum"} · Faktor ${l.gewicht} · ${l.modus === "punkte" ? maxVPvon(l) + " VP" : "direkte Note"} · ${anz}/${kl.schueler.length} erfasst</span>
      <span class="spacer"></span>
      <button class="small primary" data-open="${l.id}">Noten eingeben</button>
      <button class="small" data-edit="${l.id}">Bearbeiten</button>
      <button class="small danger" data-del="${l.id}">Löschen</button>
    </div>`;
  }
  m.innerHTML = `<div class="card">
    <h2>Leistungen</h2>
    ${items || "<p class='hint'>Noch keine Leistungen angelegt.</p>"}
    <p style="margin-top:12px"><button class="primary" id="btnNeueLeistung">+ Neue Leistung</button></p>
  </div>`;
  $("#btnNeueLeistung").onclick = () => leistungDialog(null);
  m.querySelectorAll("[data-open]").forEach(b => b.onclick = () => { offeneLeistung = b.dataset.open; renderMain(); });
  m.querySelectorAll("[data-edit]").forEach(b => b.onclick = () => leistungDialog(b.dataset.edit));
  m.querySelectorAll("[data-del]").forEach(b => b.onclick = () => {
    const l = kl.leistungen.find(x => x.id === b.dataset.del);
    if (confirm(`„${l.titel}" mit allen eingetragenen Noten löschen?`)) {
      kl.leistungen = kl.leistungen.filter(x => x.id !== l.id);
      markiereAenderung(); renderMain();
    }
  });
}

function maxVPvon(l) {
  return l.teilaufgaben.reduce((a, t) => a + (t.max || 0), 0);
}

function leistungDialog(id) {
  const kl = klasse();
  const l = id ? kl.leistungen.find(x => x.id === id) : null;
  const d = document.createElement("dialog");
  d.innerHTML = `
    <h2 style="margin-top:0">${l ? "Leistung bearbeiten" : "Neue Leistung"}</h2>
    <div class="row">
      <div style="flex:1;min-width:200px"><label>Titel</label>
        <input id="dTitel" style="width:100%" value="${l ? escapeHtml(l.titel) : ""}" placeholder="z. B. KA 1 – Kurzgeschichten"></div>
    </div>
    <div class="row" style="margin-top:10px">
      <div><label>Art</label>
        <select id="dTyp">${aktiveKategorien(kl).map(k =>
          `<option value="${k.id}" ${l && l.typ === k.id ? "selected" : ""}>${escapeHtml(k.label)}</option>`).join("")}</select></div>
      <div><label>Halbjahr</label>
        <select id="dHJ"><option value="1" ${!l || l.halbjahr === 1 ? "selected" : ""}>HJ 1</option>
        <option value="2" ${l && l.halbjahr === 2 ? "selected" : ""}>HJ 2</option></select></div>
      <div><label>Datum</label><input type="date" id="dDatum" value="${l ? (l.datum || "") : ""}"></div>
      <div><label>Faktor</label><input type="number" id="dGewicht" min="0.25" step="0.25" value="${l ? l.gewicht : 1}"></div>
      <div><label>Erfassung</label>
        <select id="dModus">
          <option value="punkte" ${!l || l.modus === "punkte" ? "selected" : ""}>Punkte + Teilaufgaben</option>
          <option value="note" ${l && l.modus === "note" ? "selected" : ""}>Note direkt</option>
        </select></div>
    </div>
    <p class="info" style="margin-top:10px">Der Faktor gewichtet diese Leistung innerhalb ihrer Kategorie (z. B. Test mit Faktor 0,5 zählt halb so viel wie einer mit 1). Neue Kategorien und ob eine Kategorie zu einer anderen "gefaltet" wird, legst du unter „Gewichtung" fest. Notensystem dieser Klasse: <strong>${kl.notensystem === "np" ? "Notenpunkte 0–15 (Kursstufe)" : "Note 1–6"}</strong>.</p>
    <p class="info" id="dFaltHinweis" style="margin-top:6px"></p>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
      <button id="dAbbr">Abbrechen</button>
      <button class="primary" id="dOk">${l ? "Übernehmen" : "Anlegen"}</button>
    </div>`;
  document.body.appendChild(d);
  d.showModal();

  const faltHinweisAktualisieren = () => {
    const typId = d.querySelector("#dTyp").value;
    const k = kl.kategorien.find(x => x.id === typId);
    const el = d.querySelector("#dFaltHinweis");
    if (k && k.faltetZu && k.id !== "gfs") {
      const ziel = kategorieLabel(kl, k.faltetZu);
      el.innerHTML = `Diese Art zählt zur Kategorie „${escapeHtml(ziel)}". Damit mehrere „${escapeHtml(k.label)}"-Leistungen zusammen wie <strong>eine</strong> zusätzliche „${escapeHtml(ziel)}" zählen (statt wie mehrere volle), setze den Faktor auf <strong>1 ÷ Anzahl geplanter „${escapeHtml(k.label)}"-Leistungen</strong> — z. B. Faktor 0,25 bei 4 geplanten.`;
    } else {
      el.innerHTML = "";
    }
  };
  const faktorVorbelegungAktualisieren = () => {
    if (l) return; // beim Bearbeiten bestehenden Faktor nicht überschreiben
    const typId = d.querySelector("#dTyp").value;
    const k = kl.kategorien.find(x => x.id === typId);
    const faktorInput = d.querySelector("#dGewicht");
    faktorInput.value = (k && k.faltetZu && k.id !== "gfs") ? "0.25" : "1";
  };
  faltHinweisAktualisieren();
  faktorVorbelegungAktualisieren();
  d.querySelector("#dTyp").onchange = () => { faltHinweisAktualisieren(); faktorVorbelegungAktualisieren(); };

  d.querySelector("#dAbbr").onclick = () => { d.close(); d.remove(); };
  d.querySelector("#dOk").onclick = () => {
    const titel = d.querySelector("#dTitel").value.trim();
    if (!titel) return alert("Bitte einen Titel angeben.");
    const modus = d.querySelector("#dModus").value;
    if (l) {
      Object.assign(l, {
        titel, typ: d.querySelector("#dTyp").value,
        halbjahr: +d.querySelector("#dHJ").value,
        datum: d.querySelector("#dDatum").value,
        gewicht: parseFloat(d.querySelector("#dGewicht").value) || 1,
        modus
      });
      if (modus === "punkte" && l.teilaufgaben.length === 0) {
        l.teilaufgaben = [{ name: "Aufgabe 1", max: 10 }];
        l.schluessel = notenschluesselLinear(10, l.system);
      }
    } else {
      const neu = {
        id: uid(), titel,
        typ: d.querySelector("#dTyp").value,
        halbjahr: +d.querySelector("#dHJ").value,
        datum: d.querySelector("#dDatum").value,
        gewicht: parseFloat(d.querySelector("#dGewicht").value) || 1,
        modus,
        system: kl.notensystem || "note",
        teilaufgaben: modus === "punkte" ? [{ name: "Aufgabe 1", max: 10 }] : [],
        schluessel: modus === "punkte" ? notenschluesselLinear(10, kl.notensystem) : [],
        noten: {}
      };
      kl.leistungen.push(neu);
      offeneLeistung = neu.id;
    }
    markiereAenderung();
    d.close(); d.remove();
    renderMain();
  };
}

/* ---------- Eingabemaske einer Leistung ---------- */

function renderLeistungEingabe(m, kl) {
  const l = kl.leistungen.find(x => x.id === offeneLeistung);
  if (!l) { offeneLeistung = null; return renderMain(); }
  const maxVP = maxVPvon(l);

  let html = `<div class="card">
    <div class="row" style="align-items:center">
      <button class="small" id="btnZurueck">← Zurück</button>
      <h2 style="margin:0">${escapeHtml(l.titel)} <span class="typ-badge">${kategorieLabel(kl, l.typ)}</span> <span class="hint">HJ${l.halbjahr} · Faktor ${l.gewicht}</span></h2>
    </div>
    ${(() => {
      const eigeneKat = (kl.kategorien || []).find(k => k.id === l.typ);
      if (eigeneKat && eigeneKat.faltetZu) {
        return `<p class="info">Optionale Leistung: Zählt zu „${escapeHtml(kategorieLabel(kl, eigeneKat.faltetZu))}". Schüler/innen ohne Eintrag gelten als „nicht vorgesehen" und werden dort einfach nicht mitgerechnet — kein Fehlversuch.</p>`;
      }
      return "";
    })()}`;

  if (l.modus === "punkte") {
    /* Teilaufgaben */
    html += `<h3>Teilaufgaben (gesamt ${maxVP} VP)</h3><div class="row">`;
    l.teilaufgaben.forEach((t, i) => {
      html += `<div><label>Name</label><input data-tname="${i}" value="${escapeHtml(t.name)}" style="width:110px">
        <label style="margin-top:4px">max. VP</label><input type="number" data-tmax="${i}" min="0" step="0.5" value="${t.max}">
        <button class="small danger" data-tdel="${i}" style="margin-top:4px">✕</button></div>`;
    });
    html += `<button class="action small" id="btnTA">+ Teilaufgabe</button></div>`;

    /* Notenschlüssel */
    const skalaLabel = l.system === "np" ? "NP" : "Note";
    const anker = l.knickAnker || {};
    // Anzeigewerte für den Knick ableiten (inkl. Rückwärtskompatibilität zum alten {vp1,vp4,vp6}-Format)
    const knickNoteVal = anker.knickNote ?? 4;
    const knickProz = anker.prozent ?? (anker.vp4 != null && maxVP ? Math.round(anker.vp4 / maxVP * 100) : 50);
    let knickNoteOptionen = "";
    for (let n = 2; n <= 5.001; n += 0.25) {
      const note = Math.round(n * 4) / 4;
      knickNoteOptionen += `<option value="${note}" ${note === knickNoteVal ? "selected" : ""}>${fmt(note, 2)}</option>`;
    }
    html += `<h3>${skalaLabel === "NP" ? "Punkteschlüssel (Notenpunkte)" : "Notenschlüssel"}</h3>
      <p class="info">Erreicht ein Schüler mindestens die angegebenen VP, erhält er die zugehörige ${skalaLabel === "NP" ? "Notenpunktzahl" : "Note"}. Zwischenwerte fallen auf den nächsttieferen Schwellwert. Wähle eine Methode zum Erzeugen — die Schwellwerte in der Tabelle darunter bleiben danach frei editierbar.</p>
      <div class="optiongroup">`;
    if (l.system !== "np") {
      html += `
        <div class="option">
          <h4>Linear</h4>
          <p class="hint">Gleichmäßige Verteilung der Noten 1–6 über die Gesamtpunktzahl (${maxVP} VP).</p>
          <button class="action small apply" id="btnLinear">Linear erzeugen</button>
        </div>
        <div class="option">
          <h4>Mit Knick</h4>
          <p class="hint">Bestehensgrenze frei wählbar: Ab der „Bestanden ab“-Punktzahl gibt es die „Note am Knick“. Ober- und unterhalb wird jeweils linear interpoliert (zwei Geraden mit Knick an dieser Note). Werte über „Note 1“ bleiben 1, unter „Note 6“ bleiben 6.</p>
          <div class="fields">
            <div><label>Bestanden ab</label>
              <span style="white-space:nowrap"><input type="number" min="1" max="99" step="1" id="knickProz" value="${knickProz}" style="width:52px"> %</span>
            </div>
            <div><label>Note am Knick</label>
              <select id="knickNote" style="width:80px">${knickNoteOptionen}</select></div>
          </div>
          <div class="hint" id="knickVpAnzeige" style="margin-top:3px"></div>
          <details style="margin:-2px 0 2px">
            <summary class="hint" style="cursor:pointer">Erweitert: VP für Note 1 / Note 6</summary>
            <div class="fields" style="margin-top:6px">
              <div><label>VP für Note 1</label><input type="number" step="0.5" id="knickVp1" placeholder="${maxVP}" value="${anker.vp1 ?? ""}" style="width:66px"></div>
              <div><label>VP für Note 6</label><input type="number" step="0.5" id="knickVp6" placeholder="0" value="${anker.vp6 ?? ""}" style="width:66px"></div>
            </div>
          </details>
          <button class="action small apply" id="btnKnick">Mit Knick erzeugen</button>
        </div>`;
    } else {
      html += `
        <div class="option">
          <h4>Linear</h4>
          <p class="hint">Notenpunkte 0–15 gleichmäßig über die Gesamtpunktzahl (${maxVP} VP) verteilt.</p>
          <button class="action small apply" id="btnLinear">Linear erzeugen</button>
        </div>
        <div class="option">
          <h4>Kursstufen-Standard</h4>
          <p class="hint">Feste Tabelle: 30 VP, NP 15 ab 28,5 VP.${maxVP !== 30 ? ` <strong>Aktuell ${maxVP} VP</strong> — weicht von 30 ab; Schwellwerte danach ggf. manuell anpassen.` : ""}</p>
          <button class="action small apply" id="btnKursstufeFix">Standard einsetzen</button>
        </div>`;
    }
    html += `</div>
      <div class="table-scroll"><table><tr><th>${skalaLabel}</th>${l.schluessel.map(r => `<th class="num">${l.system === "np" ? r.note : fmt(r.note, 2)}</th>`).join("")}</tr>
      <tr><th>ab VP</th>${l.schluessel.map((r, i) => `<td class="num"><input type="number" step="0.5" data-svp="${i}" value="${r.minVP}"></td>`).join("")}</tr></table></div>`;

    /* Punkteeingabe */
    html += `<h3>Punkteeingabe</h3><div class="table-scroll"><table>
      <tr><th>Schüler/in</th>${l.teilaufgaben.map(t => `<th class="num">${escapeHtml(t.name)}<br><span style="font-weight:400">/ ${t.max}</span></th>`).join("")}
      <th class="num">Σ VP</th><th class="num">${skalaLabel}</th></tr>`;
    for (const s of kl.schueler) {
      const e = l.noten[s.id] || { vp: [] };
      const sum = vpSumme(l, s.id);
      const n = leistungsNote(l, s.id);
      html += `<tr><td>${escapeHtml(s.name)}</td>`;
      l.teilaufgaben.forEach((t, i) => {
        const v = Array.isArray(e.vp) && typeof e.vp[i] === "number" ? e.vp[i] : "";
        html += `<td class="num"><input type="number" min="0" max="${t.max}" step="0.5" data-vp="${s.id}:${i}" value="${v}"></td>`;
      });
      html += `<td class="num"><strong id="sum-${s.id}">${n === null ? "–" : fmt(sum, 1)}</strong></td>
        <td class="num" id="note-${s.id}">${n === null ? "–" : `<span class="grade ${gradeClass(n, l.system)}">${fmt(n, l.system === "np" ? 0 : 2)}</span>`}</td></tr>`;
    }
    html += `<tr class="avg-row"><td>Ø Klasse</td>
      ${l.teilaufgaben.map((t, i) => `<td class="num" data-avg-ta="${i}"></td>`).join("")}
      <td class="num" id="avgSum"></td><td class="num" id="avgNote"></td></tr>`;
    html += `</table></div>`;
  } else {
    /* Direkte Noteneingabe */
    const npModus = l.system === "np";
    html += `<h3>${npModus ? "Noteneingabe (Notenpunkte 0–15)" : "Noteneingabe (1,00 – 6,00, Viertelnoten empfohlen)"}</h3>
      <div class="table-scroll"><table><tr><th>Schüler/in</th><th class="num">${npModus ? "NP" : "Note"}</th></tr>`;
    for (const s of kl.schueler) {
      const e = l.noten[s.id];
      const v = e && typeof e.note === "number" ? e.note : "";
      html += `<tr><td>${escapeHtml(s.name)}</td>
        <td class="num">${npModus
          ? `<input type="number" min="0" max="15" step="1" data-note="${s.id}" value="${v}">`
          : `<input type="number" min="1" max="6" step="0.25" data-note="${s.id}" value="${v}">`}</td></tr>`;
    }
    html += `<tr class="avg-row"><td>Ø Klasse</td><td class="num" id="avgNote"></td></tr>`;
    html += `</table></div>`;
  }
  html += `</div>`;
  m.innerHTML = html;

  $("#btnZurueck").onclick = () => { offeneLeistung = null; renderMain(); };

  /* Ø-Zeile live nachführen (die Eingabemaske rendert bei Punkteeingaben nicht komplett neu) */
  const mittelWert = a => a.length ? a.reduce((x, y) => x + y, 0) / a.length : null;
  const avgAktualisieren = () => {
    const mitNote = kl.schueler.map(s => leistungsNote(l, s.id)).filter(n => n !== null);
    const avgNoteEl = m.querySelector("#avgNote");
    if (avgNoteEl) avgNoteEl.textContent = fmt(mittelWert(mitNote), l.system === "np" ? 1 : 2);
    if (l.modus !== "punkte") return;
    l.teilaufgaben.forEach((t, i) => {
      const werte = kl.schueler
        .map(s => (l.noten[s.id] && Array.isArray(l.noten[s.id].vp)) ? l.noten[s.id].vp[i] : null)
        .filter(v => typeof v === "number");
      const el = m.querySelector(`[data-avg-ta="${i}"]`);
      if (el) el.textContent = fmt(mittelWert(werte), 1);
    });
    const summen = kl.schueler.filter(s => leistungsNote(l, s.id) !== null).map(s => vpSumme(l, s.id));
    const avgSumEl = m.querySelector("#avgSum");
    if (avgSumEl) avgSumEl.textContent = fmt(mittelWert(summen), 1);
  };
  avgAktualisieren();

  if (l.modus === "punkte") {
    $("#btnTA").onclick = () => {
      l.teilaufgaben.push({ name: "Aufgabe " + (l.teilaufgaben.length + 1), max: 5 });
      markiereAenderung(); renderMain();
    };
    $("#btnLinear").onclick = () => {
      if (confirm("Notenschlüssel linear neu erzeugen? Manuelle Anpassungen gehen verloren.")) {
        l.schluessel = notenschluesselLinear(maxVPvon(l), l.system);
        delete l.knickAnker;
        markiereAenderung(); renderMain();
      }
    };
    const knickProzInp = $("#knickProz");
    const knickVpAnzeige = $("#knickVpAnzeige");
    if (knickProzInp && knickVpAnzeige) {
      const zeigeVP = () => {
        const p = parseFloat(knickProzInp.value);
        const mv = maxVPvon(l);
        knickVpAnzeige.textContent = isNaN(p) ? "" : "≈ " + fmt(Math.round((mv * p / 100) * 2) / 2, 1) + " VP";
      };
      zeigeVP();
      knickProzInp.oninput = zeigeVP;
    }
    const btnKnick = $("#btnKnick");
    if (btnKnick) btnKnick.onclick = () => {
      const maxVP = maxVPvon(l);
      const proz = parseFloat($("#knickProz").value);
      const knickNote = Math.round(parseFloat($("#knickNote").value) * 4) / 4;
      const vp1Roh = $("#knickVp1").value.trim();
      const vp1 = vp1Roh === "" ? maxVP : parseFloat(vp1Roh);
      const vp6Roh = $("#knickVp6").value.trim();
      const vp6 = vp6Roh === "" ? 0 : parseFloat(vp6Roh);
      if (isNaN(proz) || proz <= 0 || proz >= 100) return alert("„Bestanden ab“ muss zwischen 1 und 99 % liegen.");
      if (isNaN(knickNote) || knickNote <= 1 || knickNote >= 6) return alert("Die Note am Knick muss zwischen 1 und 6 liegen.");
      if (isNaN(vp1) || isNaN(vp6)) return alert("VP für Note 1 und Note 6 müssen Zahlen sein (oder leer für Standard).");
      const knickVP = Math.round((maxVP * proz / 100) * 2) / 2;
      if (!(vp1 > knickVP && knickVP > vp6)) return alert(`Die Reihenfolge muss VP(Note 1) > Knickpunktzahl (${fmt(knickVP, 1)} VP) > VP(Note 6) sein.`);
      if (!confirm("Notenschlüssel mit Knick erzeugen? Manuelle Anpassungen gehen verloren.")) return;
      l.schluessel = notenschluesselKnick(maxVP, vp1, knickVP, knickNote, vp6);
      l.knickAnker = { prozent: proz, knickVP, knickNote, vp1, vp6 };
      markiereAenderung(); renderMain();
    };
    const btnKursstufeFix = $("#btnKursstufeFix");
    if (btnKursstufeFix) btnKursstufeFix.onclick = () => {
      if (!confirm("Kursstufen-Standardschlüssel (30 VP, NP 15 ab 28,5) einsetzen? Manuelle Anpassungen gehen verloren.")) return;
      l.schluessel = notenschluesselKursstufeFix();
      markiereAenderung(); renderMain();
    };
    m.querySelectorAll("[data-tname]").forEach(inp => inp.onchange = () => {
      l.teilaufgaben[+inp.dataset.tname].name = inp.value; markiereAenderung(); renderMain();
    });
    m.querySelectorAll("[data-tmax]").forEach(inp => inp.onchange = () => {
      l.teilaufgaben[+inp.dataset.tmax].max = parseFloat(inp.value) || 0; markiereAenderung(); renderMain();
    });
    m.querySelectorAll("[data-tdel]").forEach(b => b.onclick = () => {
      const i = +b.dataset.tdel;
      if (!confirm(`Teilaufgabe „${l.teilaufgaben[i].name}" löschen? Eingetragene Punkte dieser Spalte entfallen.`)) return;
      l.teilaufgaben.splice(i, 1);
      for (const sid of Object.keys(l.noten)) {
        if (Array.isArray(l.noten[sid].vp)) l.noten[sid].vp.splice(i, 1);
      }
      markiereAenderung(); renderMain();
    });
    m.querySelectorAll("[data-svp]").forEach(inp => inp.onchange = () => {
      l.schluessel[+inp.dataset.svp].minVP = parseFloat(inp.value) || 0;
      markiereAenderung(); renderMain();
    });
    m.querySelectorAll("[data-vp]").forEach(inp => inp.oninput = () => {
      const [sid, iStr] = inp.dataset.vp.split(":");
      const i = +iStr;
      l.noten[sid] = l.noten[sid] || { vp: [] };
      const v = inp.value === "" ? null : parseFloat(inp.value);
      l.noten[sid].vp[i] = (v === null || isNaN(v)) ? null : v;
      const n = leistungsNote(l, sid);
      document.getElementById("sum-" + sid).textContent = n === null ? "–" : fmt(vpSumme(l, sid), 1);
      document.getElementById("note-" + sid).innerHTML = n === null ? "–" : `<span class="grade ${gradeClass(n, l.system)}">${fmt(n, l.system === "np" ? 0 : 2)}</span>`;
      avgAktualisieren();
      markiereAenderung();
    });
  } else {
    m.querySelectorAll("[data-note]").forEach(inp => inp.onchange = () => {
      const sid = inp.dataset.note;
      const v = inp.value === "" ? null : parseFloat(inp.value);
      const maxVal = l.system === "np" ? 15 : 6;
      const minVal = l.system === "np" ? 0 : 1;
      if (v !== null && (isNaN(v) || v < minVal || v > maxVal)) { alert(`Wert zwischen ${minVal} und ${maxVal}.`); inp.value = ""; return; }
      if (v === null) delete l.noten[sid];
      else l.noten[sid] = { note: v };
      avgAktualisieren();
      markiereAenderung();
    });
  }
}

/* ---------- Schüler ---------- */

function renderSchueler(m, kl) {
  let rows = kl.schueler.map((s, i) => `<tr>
    <td class="num">${i + 1}</td>
    <td><input data-sname="${s.id}" value="${escapeHtml(s.name)}" style="width:100%;border-color:transparent;background:transparent"></td>
    <td><button class="small danger" data-sdel="${s.id}">Entfernen</button></td></tr>`).join("");
  m.innerHTML = `<div class="card">
    <h2>Schülerliste (${kl.schueler.length})</h2>
    <div class="table-scroll"><table style="max-width:560px">
      <tr><th style="width:36px">#</th><th>Name</th><th style="width:110px"></th></tr>${rows}
    </table></div>
    <h3>Hinzufügen</h3>
    <p class="hint">Ein Name pro Zeile, z. B. „Müller, Anna". Die Liste wird alphabetisch sortiert.</p>
    <textarea id="sNeu" rows="4" style="width:100%;max-width:560px" placeholder="Müller, Anna&#10;Schmidt, Ben"></textarea><br>
    <button class="primary" id="btnSAdd" style="margin-top:8px">Hinzufügen</button>
  </div>`;
  $("#btnSAdd").onclick = () => {
    const namen = $("#sNeu").value.split("\n").map(x => x.trim()).filter(Boolean);
    for (const n of namen) kl.schueler.push({ id: uid(), name: n });
    kl.schueler.sort((a, b) => a.name.localeCompare(b.name, "de"));
    markiereAenderung(); renderMain();
  };
  m.querySelectorAll("[data-sname]").forEach(inp => inp.onchange = () => {
    const s = kl.schueler.find(x => x.id === inp.dataset.sname);
    s.name = inp.value.trim();
    markiereAenderung();
  });
  m.querySelectorAll("[data-sdel]").forEach(b => b.onclick = () => {
    const s = kl.schueler.find(x => x.id === b.dataset.sdel);
    if (!confirm(`${s.name} entfernen? Alle Noten dieser Person entfallen.`)) return;
    kl.schueler = kl.schueler.filter(x => x.id !== s.id);
    for (const l of kl.leistungen) delete l.noten[s.id];
    delete kl.overrides[s.id];
    markiereAenderung(); renderMain();
  });
}

/* ---------- Gewichtung / Einstellungen ---------- */

function kategorieZeile(kl, k) {
  const zielOptionen = kl.kategorien.filter(x => x.id !== k.id && !x.faltetZu);
  const zielLabel = k.faltetZu ? kategorieLabel(kl, k.faltetZu) : null;
  return `<div class="row" style="align-items:center;border-bottom:1px solid var(--line);padding:8px 4px;margin:0" data-katzeile="${k.id}">
    <input type="checkbox" data-kat-aktiv="${k.id}" ${k.aktiv ? "checked" : ""} title="Kategorie in dieser Klasse nutzen">
    <input data-kat-label="${k.id}" value="${escapeHtml(k.label)}" style="width:150px">
    <select data-kat-modus="${k.id}" style="width:165px">
      <option value="eigen" ${!k.faltetZu ? "selected" : ""}>Eigene Gewichtung</option>
      <option value="falten" ${k.faltetZu ? "selected" : ""}>Zählt zu …</option>
    </select>
    <span data-kat-gewicht-wrap="${k.id}" style="${k.faltetZu ? "display:none" : ""}">
      <input type="number" min="0" max="100" data-kat-gewicht="${k.id}" value="${k.gewicht ?? 0}" style="width:64px"> %</span>
    <select data-kat-ziel="${k.id}" style="${k.faltetZu ? "" : "display:none"}">
      ${zielOptionen.map(o => `<option value="${o.id}" ${k.faltetZu === o.id ? "selected" : ""}>${escapeHtml(o.label)}</option>`).join("")}
    </select>
    <button class="small danger" data-kat-del="${k.id}">✕</button>
  </div>
  ${(k.faltetZu && k.id !== "gfs") ? infoDetails("kat-falt-" + k.id,
    `Wichtig: Faktor je „${escapeHtml(k.label)}" auf <strong>1 ÷ Anzahl geplanter Leistungen</strong> setzen (z. B. 0,25 bei 4) — sonst zieht jede einzelne so viel Gewicht wie eine ganze „${escapeHtml(zielLabel)}"`,
    `<p>Der Faktor wird im Feld „Faktor" beim Anlegen der Leistung gesetzt. Beispiel bei 4 geplanten „${escapeHtml(k.label)}"-Leistungen mit Faktor 0,25: Sind bei einem Schüler alle 4 erfasst, zählt der „${escapeHtml(k.label)}"-Block wie <strong>eine</strong> volle „${escapeHtml(zielLabel)}" (Gewicht 1,0). Fehlt eine, sind es 3 × 0,25 = 0,75 — etwas weniger, aber kein Fehlversuch. Beim Standard-Faktor 1 zählen 4 „${escapeHtml(k.label)}"-Leistungen dagegen wie 4 volle „${escapeHtml(zielLabel)}".</p>`,
    `style="margin:2px 0 10px 26px"`, "warn") : ""}`;
}

function renderEinstellungen(m, kl) {
  const istNP = kl.notensystem === "np";
  const eigeneAktive = kl.kategorien.filter(k => k.aktiv && !k.faltetZu);
  const summe = eigeneAktive.reduce((a, k) => a + (k.gewicht || 0), 0);
  m.innerHTML = `<div class="card">
    <h2>Gewichtung — ${escapeHtml(kl.name)} ${escapeHtml(kl.fach)}</h2>
    <h3>Notensystem</h3>
    <p class="info"><strong>${istNP ? "Notenpunkte 0–15 (Kursstufe)" : "Note 1–6"}</strong> — bei Anlage der Klasse festgelegt, danach nicht mehr änderbar (sonst würden bestehende Einträge falsch interpretiert). Für ein anderes Notensystem lege eine neue Klasse an.</p>
    <h3>Kategorien</h3>
    <p class="info">Häkchen = Kategorie wird in dieser Klasse genutzt (erscheint dann bei „Art" beim Anlegen einer Leistung). „Eigene Gewichtung" gibt der Kategorie ein festes %-Gewicht; „Zählt zu …" faltet sie stattdessen vollständig in eine andere Kategorie (z. B. Test zusammen wie eine zusätzliche KA, ohne eigenes Gewicht). Kategorien ohne eingetragene Noten werden für den jeweiligen Schüler automatisch ignoriert; die übrigen Gewichte werden dann anteilig hochgerechnet.</p>
    <div>${kl.kategorien.map(k => kategorieZeile(kl, k)).join("")}</div>
    <div class="row" style="margin-top:10px;align-items:center">
      <button class="action small" id="btnKatAdd">+ Kategorie hinzufügen</button>
      <span><label>Summe (eigene, aktive Kategorien)</label>
        <strong class="num" id="gewSumme" style="color:${summe === 100 ? "var(--good)" : "var(--bad)"}">${summe} %</strong></span>
    </div>
    ${istNP ? `
    <h3>Halbjahresnote</h3>
    <p class="info">In der Kursstufe ist jedes Halbjahr eine eigenständige Endnote. HJ 1 und HJ 2 werden <strong>nicht</strong> zu einer Jahresnote verrechnet.</p>
    <h3>Rundung</h3>
    <p class="info">Kaufmännisch auf ganze Notenpunkte (0–15). Grenzfälle um x,5 werden in der Übersicht orange markiert und können dort pädagogisch festgelegt werden.</p>
    ` : `
    <h3>Jahresnote</h3>
    <p class="info">Die Jahresnote wird aus allen Leistungen des gesamten Schuljahres gemeinsam berechnet (gewichtet wie oben eingestellt) — keine separate Verrechnung der Halbjahre.</p>
    <h3>Rundung</h3>
    <p class="info">Halbjahr: kaufmännisch auf Viertelnoten. Jahr: kaufmännisch auf ganze Noten; Grenzfälle um x,5 werden in der Übersicht orange markiert und können dort pädagogisch festgelegt werden.</p>
    `}
    <h3>Klasse</h3>
    <div class="row">
      <div><label>Bezeichnung</label><input id="kName" value="${escapeHtml(kl.name)}"></div>
      <div><label>Fach</label><input id="kFach" value="${escapeHtml(kl.fach)}"></div>
      <div><label>Schuljahr</label><input id="kSj" value="${escapeHtml(kl.schuljahr)}"></div>
      <div><button class="danger" id="kDel">Klasse löschen</button></div>
    </div>
  </div>`;
  bindInfoDetails(m);

  m.querySelectorAll("[data-kat-aktiv]").forEach(cb => cb.onchange = () => {
    const k = kl.kategorien.find(x => x.id === cb.dataset.katAktiv);
    k.aktiv = cb.checked;
    markiereAenderung(); renderMain();
  });
  m.querySelectorAll("[data-kat-label]").forEach(inp => inp.onchange = () => {
    const k = kl.kategorien.find(x => x.id === inp.dataset.katLabel);
    k.label = inp.value.trim() || k.label;
    markiereAenderung(); renderMain();
  });
  m.querySelectorAll("[data-kat-gewicht]").forEach(inp => inp.onchange = () => {
    const k = kl.kategorien.find(x => x.id === inp.dataset.katGewicht);
    k.gewicht = Math.max(0, parseFloat(inp.value) || 0);
    markiereAenderung(); renderMain();
  });
  m.querySelectorAll("[data-kat-ziel]").forEach(sel => sel.onchange = () => {
    const k = kl.kategorien.find(x => x.id === sel.dataset.katZiel);
    k.faltetZu = sel.value;
    markiereAenderung(); renderMain();
  });
  m.querySelectorAll("[data-kat-modus]").forEach(sel => sel.onchange = () => {
    const k = kl.kategorien.find(x => x.id === sel.dataset.katModus);
    if (sel.value === "falten") {
      const zielKandidaten = kl.kategorien.filter(x => x.id !== k.id && !x.faltetZu);
      if (zielKandidaten.length === 0) {
        alert("Es gibt keine andere eigenständige Kategorie, zu der gefaltet werden könnte.");
        sel.value = "eigen";
        return;
      }
      const wirdAlsZielGenutzt = kl.kategorien.some(x => x.id !== k.id && x.faltetZu === k.id);
      if (wirdAlsZielGenutzt) {
        alert(`„${k.label}" ist bereits Ziel einer anderen Faltung und kann selbst nicht gefaltet werden. Ändere zuerst die andere Kategorie.`);
        sel.value = "eigen";
        return;
      }
      k.faltetZu = zielKandidaten[0].id;
    } else {
      k.faltetZu = null;
    }
    markiereAenderung(); renderMain();
  });
  m.querySelectorAll("[data-kat-del]").forEach(btn => btn.onclick = () => {
    const id = btn.dataset.katDel;
    const k = kl.kategorien.find(x => x.id === id);
    if (kl.leistungen.some(l => l.typ === id)) {
      return alert(`„${k.label}" kann nicht gelöscht werden, solange Leistungen dieser Art existieren. Lösche oder ändere zuerst diese Leistungen unter „Leistungen".`);
    }
    if (kl.kategorien.some(x => x.id !== id && x.faltetZu === id)) {
      return alert(`„${k.label}" ist Ziel einer Faltung anderer Kategorien und kann nicht gelöscht werden. Ändere zuerst diese anderen Kategorien.`);
    }
    if (!confirm(`Kategorie „${k.label}" wirklich löschen?`)) return;
    kl.kategorien = kl.kategorien.filter(x => x.id !== id);
    markiereAenderung(); renderMain();
  });
  $("#btnKatAdd").onclick = () => {
    const label = prompt("Name der neuen Kategorie (z. B. »Praktische Arbeit«):");
    if (!label || !label.trim()) return;
    kl.kategorien.push({ id: uid(), label: label.trim(), aktiv: true, faltetZu: null, gewicht: 0 });
    markiereAenderung(); renderMain();
  };

  $("#kName").onchange = e => { kl.name = e.target.value.trim(); markiereAenderung(); renderAll(); };
  $("#kFach").onchange = e => { kl.fach = e.target.value.trim(); markiereAenderung(); renderAll(); };
  $("#kSj").onchange = e => { kl.schuljahr = e.target.value.trim(); markiereAenderung(); renderAll(); };
  $("#kDel").onclick = () => {
    if (!confirm(`Klasse „${kl.name} ${kl.fach}" mit allen Noten endgültig löschen?`)) return;
    state.klassen = state.klassen.filter(k => k.id !== kl.id);
    aktiveKlasse = state.klassen[0]?.id ?? null;
    markiereAenderung(); renderAll();
  };
}

/* ---------- Klassen-Dialog ---------- */

function klasseDialog() {
  const d = document.createElement("dialog");
  const jahr = new Date().getFullYear();
  d.innerHTML = `
    <h2 style="margin-top:0">Neue Klasse</h2>
    <div class="row">
      <div><label>Bezeichnung</label><input id="nkName" placeholder="7b" style="width:90px"></div>
      <div><label>Fach</label><input id="nkFach" placeholder="Deutsch" style="width:140px"></div>
      <div><label>Schuljahr</label><input id="nkSj" value="${jahr}/${(jahr + 1) % 100}" style="width:110px"></div>
    </div>
    <div class="row" style="margin-top:10px">
      <div><label>Notensystem</label>
        <select id="nkSystem">
          <option value="note">Note (1–6)</option>
          <option value="np">Notenpunkte (0–15, Kursstufe)</option>
        </select></div>
    </div>
    <p class="info" style="margin-top:8px">Bei Notenpunkten ist jedes Halbjahr eine eigenständige Endnote — es gibt keine Jahresnote. Das Notensystem kann nach dem Anlegen nicht mehr geändert werden.</p>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
      <button id="nkAbbr">Abbrechen</button>
      <button class="primary" id="nkOk">Anlegen</button>
    </div>`;
  document.body.appendChild(d);
  d.showModal();
  d.querySelector("#nkAbbr").onclick = () => { d.close(); d.remove(); };
  d.querySelector("#nkOk").onclick = () => {
    const name = d.querySelector("#nkName").value.trim();
    const fach = d.querySelector("#nkFach").value.trim();
    if (!name || !fach) return alert("Bitte Bezeichnung und Fach angeben.");
    const system = d.querySelector("#nkSystem").value;
    const k = neueKlasse(name, fach, d.querySelector("#nkSj").value.trim(), system);
    state.klassen.push(k);
    aktiveKlasse = k.id;
    aktiveView = "schueler";
    markiereAenderung();
    d.close(); d.remove();
    renderAll();
  };
}

/* ---------- Hilfsfunktionen ---------- */

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function kurz(s) { return s.length > 14 ? s.slice(0, 13) + "…" : s; }

/* ---------- Start ---------- */

document.getElementById("btnOpen").onclick = oeffnen;
document.getElementById("btnSave").onclick = () => speichern(false);
document.getElementById("btnSaveAs").onclick = () => speichern(true);
document.getElementById("btnPasswort").onclick = passwortDialog;
aktualisierePasswortButton();

if (!hatFSA) {
  const kannWebShareDateien = !!(navigator.canShare && navigator.share &&
    navigator.canShare({ files: [new File(["x"], "test.json", { type: "application/json" })] }));
  document.getElementById("autosaveInfo").textContent = kannWebShareDateien
    ? "Hinweis: Dieser Browser unterstützt kein direktes Speichern in die Datei — »Speichern« öffnet stattdessen ein Teilen-Menü. Wähle dort „In Dateien sichern\" und überschreibe deine bestehende Notenbuch-Datei. Automatisches Speichern ist auf diesem Gerät nicht möglich."
    : "Hinweis: Dieser Browser unterstützt kein direktes Speichern in die Datei — »Speichern« lädt die Datei stattdessen herunter (Chrome oder Edge empfohlen).";
}

renderAll();
</script>
